services:
  travel-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-planner
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # 靜態檔案（HTML/CSS/JS）與資料統一 mount
      - ./web:/usr/share/nginx/html:ro
      - ./data:/usr/share/nginx/html/data:ro
    networks:
      - travel-net
    depends_on:
      - travel-api

  travel-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    networks:
      - travel-net

networks:
  travel-net:
    driver: bridge
