<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 旅遊行程規劃系統</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- ===== Header ===== -->
  <header>
    <h1>🌍 旅遊行程規劃系統</h1>
    <p class="subtitle">選擇地區與偏好，即時生成不趕路的慢活行程</p>
  </header>

  <!-- ===== Main Layout ===== -->
  <div class="main-layout">

    <!-- ===== Left Panel: Input ===== -->
    <aside class="panel panel-input">

      <div class="form-group">
        <label for="region-select">📍 <strong>選擇地區</strong></label>
        <select id="region-select">
          <option value="">— 請選擇地區 —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="days-select">📅 <strong>天數</strong></label>
        <select id="days-select" disabled>
          <option value="">— 先選地區 —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="travelers">👥 <strong>同行人數</strong></label>
        <input type="number" id="travelers" min="1" max="20" value="1">
      </div>

      <div class="form-group">
        <label>✅ <strong>必去景點</strong>（3個欄位，可打關鍵字搜尋）</label>
        <div class="autocomplete-wrapper" data-slot="0" data-type="want">
          <input type="text" class="want-input" data-slot="0" placeholder="欄位1：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="0" data-type="want"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="1" data-type="want">
          <input type="text" class="want-input" data-slot="1" placeholder="欄位2：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="1" data-type="want"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="2" data-type="want">
          <input type="text" class="want-input" data-slot="2" placeholder="欄位3：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="2" data-type="want"></div>
        </div>
      </div>

      <div class="form-group">
        <label>❌ <strong>不去景點</strong>（3個欄位）</label>
        <div class="autocomplete-wrapper" data-slot="0" data-type="dontwant">
          <input type="text" class="dontwant-input" data-slot="0" placeholder="欄位1：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="0" data-type="dontwant"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="1" data-type="dontwant">
          <input type="text" class="dontwant-input" data-slot="1" placeholder="欄位2：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="1" data-type="dontwant"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="2" data-type="dontwant">
          <input type="text" class="dontwant-input" data-slot="2" placeholder="欄位3：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="2" data-type="dontwant"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="other-needs">💬 <strong>其他需求</strong></label>
        <textarea id="other-needs" rows="4" placeholder="用餐偏好、特殊需求、身體狀況、親子族群、飲食禁忌等..."></textarea>
      </div>

      <button id="generate-btn" class="btn-primary" disabled>
        🚀 生成行程
      </button>

      <div id="alerts-container"></div>

    </aside>

    <!-- ===== Right Panel: Output ===== -->
    <main class="panel panel-output">

      <!-- Transport Info (shown after region selected) -->
      <div id="transport-panel" class="hidden">
        <h2>🚗 交通建議</h2>
        <div id="transport-content"></div>
      </div>

      <!-- Itinerary Output (shown after generate) -->
      <div id="itinerary-output" class="hidden">
        <div class="output-header">
          <h2>📋 行程規劃</h2>
          <button id="print-btn" class="btn-secondary">🖨️ 列印</button>
        </div>
        <div id="itinerary-content"></div>
      </div>

      <!-- Empty State -->
      <div id="empty-state">
        <p>👈 填寫左側表單，選擇地區與天數</p>
        <p>設定必去 / 不去的景點</p>
        <p>按下「🚀 生成行程」即可看到結果</p>
      </div>

    </main>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
