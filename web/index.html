<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 旅遊行程規劃系統</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- ===== Header ===== -->
  <header>
    <h1>🌍 旅遊行程規劃系統</h1>
    <p class="subtitle">選擇地區與偏好，即時生成不趕路的慢活行程</p>
  </header>

  <!-- ===== Main Layout ===== -->
  <div class="main-layout">

    <!-- ===== Left Panel: Input ===== -->
    <aside class="panel panel-input">

      <!-- 地區 -->
      <div class="form-group">
        <label for="region-select">📍 <strong>選擇地區</strong></label>
        <select id="region-select">
          <option value="">— 請選擇地區 —</option>
        </select>
      </div>

      <!-- 天數（1-10自選） -->
      <div class="form-group">
        <label for="days-select">📅 <strong>旅遊天數</strong></label>
        <div class="days-range-wrapper">
          <input type="range" id="days-range" min="1" max="10" value="5" step="1">
          <span id="days-display">5天4夜</span>
        </div>
        <select id="days-select" disabled>
          <option value="">— 先選地區 —</option>
        </select>
      </div>

      <!-- 同行人數 -->
      <div class="form-group">
        <label for="travelers">👥 <strong>同行人數</strong></label>
        <input type="number" id="travelers" min="1" max="20" value="1">
      </div>

      <!-- 必去車站（可選，autocomplete） -->
      <div class="form-group">
        <label>🚉 <strong>必經車站</strong>（選填，最多8個，可打關鍵字搜尋）</label>
        <div class="autocomplete-wrapper" data-slot="0" data-type="station">
          <input type="text" class="station-input" data-slot="0" placeholder="欄位1：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="0" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="1" data-type="station">
          <input type="text" class="station-input" data-slot="1" placeholder="欄位2：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="1" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="2" data-type="station">
          <input type="text" class="station-input" data-slot="2" placeholder="欄位3：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="2" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="3" data-type="station">
          <input type="text" class="station-input" data-slot="3" placeholder="欄位4：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="3" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="4" data-type="station">
          <input type="text" class="station-input" data-slot="4" placeholder="欄位5：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="4" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="5" data-type="station">
          <input type="text" class="station-input" data-slot="5" placeholder="欄位6：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="5" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="6" data-type="station">
          <input type="text" class="station-input" data-slot="6" placeholder="欄位7：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="6" data-type="station"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="7" data-type="station">
          <input type="text" class="station-input" data-slot="7" placeholder="欄位8：輸入車站名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="7" data-type="station"></div>
        </div>
      </div>

      <!-- 必去景點（4欄位） -->
      <div class="form-group">
        <label>✅ <strong>必去景點</strong>（4個欄位，可打關鍵字搜尋）</label>
        <div class="autocomplete-wrapper" data-slot="0" data-type="want">
          <input type="text" class="want-input" data-slot="0" placeholder="欄位1：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="0" data-type="want"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="1" data-type="want">
          <input type="text" class="want-input" data-slot="1" placeholder="欄位2：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="1" data-type="want"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="2" data-type="want">
          <input type="text" class="want-input" data-slot="2" placeholder="欄位3：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="2" data-type="want"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="3" data-type="want">
          <input type="text" class="want-input" data-slot="3" placeholder="欄位4：輸入景點名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="3" data-type="want"></div>
        </div>
      </div>

      <!-- 想去Outlets（2欄位） -->
      <div class="form-group">
        <label>🛍️ <strong>想去Outlets</strong>（2個欄位）</label>
        <div class="autocomplete-wrapper" data-slot="0" data-type="outlet">
          <input type="text" class="outlet-input" data-slot="0" placeholder="欄位1：輸入Outlet名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="0" data-type="outlet"></div>
        </div>
        <div class="autocomplete-wrapper" data-slot="1" data-type="outlet">
          <input type="text" class="outlet-input" data-slot="1" placeholder="欄位2：輸入Outlet名稱...">
          <div class="autocomplete-dropdown hidden" data-slot="1" data-type="outlet"></div>
        </div>
      </div>

      <!-- 用餐習慣（多選） -->
      <div class="form-group">
        <label>🍽️ <strong>用餐習慣</strong>（可複選）</label>
        <div class="food-checkboxes" id="food-checkboxes">
          <!-- 動態產生 -->
          <span class="food-loading">載入中...</span>
        </div>
      </div>

      <!-- 其他需求 -->
      <div class="form-group">
        <label for="other-needs">💬 <strong>其他需求</strong></label>
        <textarea id="other-needs" rows="3" placeholder="特殊需求、身體狀況、親子族群、飲食禁忌等..."></textarea>
      </div>

      <button id="generate-btn" class="btn-primary" disabled>
        🚀 生成行程
      </button>

      <div id="alerts-container"></div>

    </aside>

    <!-- ===== Right Panel: Output ===== -->
    <main class="panel panel-output">

      <!-- Transport Info -->
      <div id="transport-panel" class="hidden">
        <h2>🚗 交通建議</h2>
        <div id="transport-content"></div>
      </div>

      <!-- Itinerary Output -->
      <div id="itinerary-output" class="hidden">
        <div class="output-header">
          <h2>📋 行程規劃</h2>
          <button id="print-btn" class="btn-secondary">🖨️ 列印</button>
        </div>
        <div id="itinerary-content"></div>
      </div>

      <!-- Empty State -->
      <div id="empty-state">
        <p>👈 填寫左側表單，選擇地區與天數</p>
        <p>設定必經車站 / 必去景點</p>
        <p>按「🚀 生成行程」即可看到結果</p>
      </div>

    </main>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
